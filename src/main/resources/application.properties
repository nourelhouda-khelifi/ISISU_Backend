spring.application.name=ISISU
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

server.port=${SERVER_PORT:8080}

# Spring Security Configuration
spring.security.user.name=${SECURITY_USER_NAME}
spring.security.user.password=${SECURITY_USER_PASSWORD}
spring.security.user.roles=${SECURITY_USER_ROLES:ADMIN}

# Swagger OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# JWT application configuration
app.jwt.secret=${JWT_SECRET:change-me-in-env}
app.jwt.access-token-ttl-seconds=${JWT_ACCESS_TOKEN_TTL_SECONDS:3600}
app.jwt.issuer=${JWT_ISSUER:isis-u}

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# SendGrid Email Configuration
sendgrid.api-key=${SENDGRID_API_KEY}
sendgrid.from-email=${SENDGRID_FROM_EMAIL}

# Gemini Recommandation LLM
gemini.api-key=${GEMINI_API_KEY}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
gemini.url=${GEMINI_URL:https://generativelanguage.googleapis.com/v1beta/models}



